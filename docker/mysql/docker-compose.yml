version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # Change this to a strong password
      MYSQL_DATABASE: ${MYSQL_DATABASE}           # Optional: auto-create a database
      MYSQL_USER: ${MYSQL_USER}                   # Optional: create an application user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}           # Optional: password for the user
    ports:
      - "3306:3306"                          # Host port:Container port
    volumes:
      - mysql_data:/var/lib/mysql            # Persist data
      - ./initdb:/docker-entrypoint-initdb.d # Optional: run .sql scripts at startup
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:

